<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruchrechnen — MatheMagic</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="nav">
            <a href="index.html" class="nav-back">← Zurück</a>
            <span class="nav-title">🍕 Bruchrechnen</span>
            <div class="nav-score">
                <span class="score-stars" id="starsDisplay">⭐ 0</span>
                <span class="score-points" id="pointsDisplay">0 Pkt</span>
                <span class="score-streak" id="streakDisplay"></span>
            </div>
        </nav>

        <!-- Schwierigkeitsgrad -->
        <div class="difficulty-bar">
            <span class="difficulty-label">Schwierigkeit:</span>
            <select class="difficulty-select" id="difficultySelect">
                <option value="easy">Leicht (Kl. 3-4)</option>
                <option value="medium">Mittel (Kl. 4-5)</option>
                <option value="hard">Schwer (Kl. 5-6)</option>
            </select>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="modeTabs">
            <button class="tab active" data-mode="recognize">Erkennen</button>
            <button class="tab" data-mode="simplify">Kürzen</button>
            <button class="tab" data-mode="expand">Erweitern</button>
            <button class="tab" data-mode="add">Addieren</button>
            <button class="tab" data-mode="build">Bauen</button>
            <button class="tab" data-mode="paint">Einfärben</button>
        </div>

        <!-- Hauptbereich -->
        <div class="card">
            <div class="task-area">
                <!-- Aufgabentext -->
                <p class="task-instruction" id="taskInstruction">Welcher Bruch wird hier angezeigt?</p>

                <!-- SVG Visualisierung (für Erkennen/Kürzen/Erweitern/Addieren) -->
                <div class="svg-container" id="svgContainer"></div>

                <!-- Standard Aufgabe + Eingabe -->
                <div class="task-fraction-display" id="taskDisplay"></div>

                <!-- Build-Modus Bereich -->
                <div class="build-area" id="buildArea">
                    <div class="build-layout">
                        <!-- Drop Zone -->
                        <div class="drop-zone" id="dropZone">
                            <svg viewBox="0 0 200 200" id="buildSVG"></svg>
                            <div class="drop-zone-label" id="dropLabel">Klicke auf Bruchstücke oder ziehe sie hierher!</div>
                            <div class="ghost-circle" id="ghostCircle">
                                <svg viewBox="0 0 200 200" id="ghostSVG"></svg>
                            </div>
                        </div>

                        <!-- Hinzugefügte Stücke -->
                        <div class="build-added" id="buildAdded"></div>

                        <!-- Summe Anzeige -->
                        <div class="build-sum" id="buildSum"></div>

                        <!-- Bruchstücke Palette -->
                        <div class="pieces-palette" id="piecesPalette"></div>

                        <!-- Antwort-Eingabe -->
                        <div class="build-answer" id="buildAnswer">
                            <span class="build-answer-label">Ergebnis =</span>
                            <div class="fraction-input">
                                <input type="number" id="buildNum" placeholder="?" autocomplete="off">
                                <span class="fraction-line"></span>
                                <input type="number" id="buildDen" placeholder="?" autocomplete="off">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Einfärben-Modus Bereich -->
                <div class="paint-area" id="paintArea">
                    <div class="paint-layout">
                        <div class="paint-grid-container" id="paintGrid"></div>
                        <div class="paint-counter" id="paintCounter">0 von 0 eingefärbt</div>
                    </div>
                </div>

                <!-- Aktionsbuttons -->
                <div class="actions">
                    <button class="btn btn-primary" id="checkBtn">Prüfen ✓</button>
                    <button class="btn btn-success" id="nextBtn" style="display:none;">Nächste →</button>
                </div>

                <!-- Stütze + Ghost + Reset Buttons -->
                <div class="support-buttons">
                    <button class="btn btn-small btn-outline" id="hintBtn">💡 Stütze</button>
                    <button class="btn btn-small btn-outline" id="ghostBtn">👻 Lösung zeigen</button>
                    <button class="btn btn-small btn-reset" id="resetBtn">↺ Neustart</button>
                </div>

                <!-- Stütze Anzeige -->
                <div class="hint-box" id="hintBox"></div>

                <!-- Feedback -->
                <div class="feedback" id="feedback"></div>
            </div>

            <!-- Fortschritt -->
            <div class="progress-bar-container">
                <div class="progress-info">
                    <span id="taskCounter">Aufgabe 1 von 10</span>
                    <span id="correctCounter">0 richtig</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <footer class="footer">
            MatheMagic &copy; 2026
        </footer>
    </div>

    <!-- Ergebnis-Overlay -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
            <div class="result-emoji" id="resultEmoji">🎉</div>
            <h2 class="result-title" id="resultTitle">Super gemacht!</h2>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-value" id="resultCorrect">0</div>
                    <div class="result-stat-label">Richtig</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="resultWrong">0</div>
                    <div class="result-stat-label">Falsch</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="resultPoints">0</div>
                    <div class="result-stat-label">Punkte</div>
                </div>
            </div>
            <div class="result-stars" id="resultStars"></div>
            <p class="result-message" id="resultMessage">Weiter so!</p>
            <button class="btn btn-primary btn-block" id="restartBtn">Nochmal spielen 🔄</button>
        </div>
    </div>

    <script src="js/confetti.js"></script>
    <script src="js/brueche.js"></script>
</body>
</html>
